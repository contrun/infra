- name: configure hosts
  hosts: "{{ hsts | split(',') | select }}"
  vars:
  tasks:
    - set_fact:
        svcs: "{{ services | split(',') | select | default(enabled_services, true) }}"
    - debug:
        msg: "Installing services {{ svcs }}"
    - ansible.builtin.include_tasks: "tasks/{{ svc }}.yml"
      loop: "{{ svcs }}"
      loop_control:
        loop_var: svc
      ignore_errors: true
      when: ansible_facts['os_family'] != "Windows"
    - ansible.builtin.include_tasks: "tasks/{{ svc }}.windows.yml"
      loop: "{{ svcs }}"
      loop_control:
        loop_var: svc
      ignore_errors: true
      when: ansible_facts['os_family'] == "Windows"
