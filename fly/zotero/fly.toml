# fly.toml app configuration file generated for bib on 2026-03-09T13:49:47+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bib'
primary_region = 'nrt'

[build]
  image = 'contrun/zotero:latest'

[http_service]
  internal_port = 24119
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
source = 'bib'
destination = '/home/e'
initial_size = '1gb'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
