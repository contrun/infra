#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flyclone'
primary_region = 'sin'

[build]
  image = 'contrun/rclone:latest'

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
source = 'flyclone'
destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
